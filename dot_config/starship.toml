"$schema" = 'https://starship.rs/config-schema.json'

format = """
$username\
$directory\
$git_branch\
$git_status\
$fill\
$c\
$elixir\
$elm\
$golang\
$haskell\
$java\
$julia\
$nodejs\
$nim\
$rust\
$scala\
$conda\
$python\
$ruby\
$time\n  \
[уұһӘ](fg:iris) \
"""

palette = "rose-pine-moon"

[palettes.rose-pine-moon]
overlay = '#393552'
love = '#eb6f92'
gold = '#f6c177'
rose = '#ea9a97'
pine = '#3e8fb0'
foam = '#9ccfd8'
iris = '#c4a7e7'

[directory]
format = "[оӮ¶](fg:overlay)[ $path ]($style)[оӮҙ](fg:overlay) "
style = "bg:overlay fg:pine"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
Documents = "у°Ҳҷ"
Downloads = "пҖҷ "
Music = "пҖҒ "
Pictures = "пҖҫ "

[fill]
style = "fg:overlay"
symbol = " "

[git_branch]
format = "[оӮ¶](fg:overlay)[ $symbol $branch ]($style)[оӮҙ](fg:overlay) "
style = "bg:overlay fg:foam"
symbol = "пҗҳ"

[git_status]
disabled = false
style = "bg:overlay fg:love"
format = '[оӮ¶](fg:overlay)([$all_status$ahead_behind]($style))[оӮҙ](fg:overlay) '
up_to_date = ''
untracked = ''
stashed = ''
modified = '[ !\($count\) ](bg:overlay fg:gold)'
renamed = ''
deleted = ''
staged = '[ +\($count\) ](bg:overlay fg:gold)'
ahead = '[ вҮЎ${count} ](bg:overlay fg:foam)'
diverged = ''
behind = '[ вҮЈ${count} ](bg:overlay fg:rose)'

[time]
disabled = false
format = " [оӮ¶](fg:overlay)[ $time у°ҙҲ ]($style)[оӮҙ](fg:overlay)"
style = "bg:overlay fg:rose"
time_format = "%I:%M%P"
use_12hr = true

[username]
disabled = false
format = "[оӮ¶](fg:overlay)[ у°§ұ $user ]($style)[оӮҙ](fg:overlay) "
show_always = true
style_root = "bg:overlay fg:iris"
style_user = "bg:overlay fg:iris"

# Languages

[c]
style = "bg:overlay fg:pine"
format = " [оӮ¶](fg:overlay)[ $symbol$version ]($style)[оӮҙ](fg:overlay)"
disabled = false
symbol = "оҳһ "

