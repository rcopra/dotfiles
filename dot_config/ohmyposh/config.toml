version = 4
final_space = true
console_title_template = '{{ .Folder }}'

# First line - path, git, fill, hostname, time
[[blocks]]
  type = 'prompt'
  alignment = 'left'

  [[blocks.segments]]
    type = 'os'
    style = 'plain'
    foreground = '#C0CAF5'
    template = '{{ .Icon }}'

  [[blocks.segments]]
    type = 'text'
    style = 'plain'
    foreground = '#565F89'
    template = '─'

  [[blocks.segments]]
    type = 'path'
    style = 'plain'
    foreground = '#7AA2F7'
    template = ' {{ .Path }}'
    [blocks.segments.properties]
      style = 'full'

  [[blocks.segments]]
    type = 'git'
    style = 'plain'
    foreground = '#9ECE6A'
    template = ' {{ .HEAD }}{{ if or .Working.Changed .Staging.Changed .Working.Untracked }} {{ end }}{{ if .Working.Changed }}<#FF9E64>!{{ .Working.Changed }}</>{{ end }}{{ if .Working.Untracked }}<#FF9E64>?{{ .Working.Untracked }}</>{{ end }}{{ if .Staging.Changed }}<#7AA2F7>+{{ .Staging.Changed }}</>{{ end }}{{ if gt .StashCount 0 }}<#BB9AF7>*{{ .StashCount }}</>{{ end }}'
    [blocks.segments.properties]
      fetch_status = true
      branch_icon = ''

[[blocks]]
  type = 'prompt'
  alignment = 'right'

  [[blocks.segments]]
    type = 'executiontime'
    style = 'plain'
    foreground = '#E0AF68'
    template = ' {{ .FormattedMs }}'
    [blocks.segments.properties]
      threshold = 500
      style = 'roundrock'

  [[blocks.segments]]
    type = 'time'
    style = 'plain'
    foreground = '#C0CAF5'
    template = ' {{ .CurrentDate | date "15:04:05" }}'

# Second line - prompt character
[[blocks]]
  type = 'prompt'
  alignment = 'left'
  newline = true

  [[blocks.segments]]
    type = 'text'
    style = 'plain'
    foreground = '#565F89'
    template = '╰─'

  [[blocks.segments]]
    type = 'status'
    style = 'plain'
    foreground = '#E0AF68'
    foreground_templates = ['{{ if gt .Code 0 }}#F7768E{{ end }}']
    template = '❯ '

# Transient prompt for cleaner history
[transient_prompt]
  foreground = '#E0AF68'
  foreground_templates = ['{{ if gt .Code 0 }}#F7768E{{ end }}']
  template = '❯ '
