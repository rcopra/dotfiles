version = 4
final_space = true
console_title_template = '{{ .Folder }}'

# First line - path, git, fill, hostname, time
[[blocks]]
  type = 'prompt'
  alignment = 'left'

  [[blocks.segments]]
    type = 'os'
    style = 'plain'
    foreground = '#F8F8F2'
    template = '{{ .Icon }}'

  [[blocks.segments]]
    type = 'text'
    style = 'plain'
    foreground = '#6272A4'
    template = '─'

  [[blocks.segments]]
    type = 'path'
    style = 'plain'
    foreground = '#BD93F9'
    template = ' {{ .Path }}'
    [blocks.segments.properties]
      style = 'full'

  [[blocks.segments]]
    type = 'git'
    style = 'plain'
    foreground = '#FFB86C'
    template = ' {{ .HEAD }}{{ if or .Working.Changed .Staging.Changed .Working.Untracked }} {{ end }}{{ if .Working.Changed }}<#FF5555>!{{ .Working.Changed }}</>{{ end }}{{ if .Working.Untracked }}<#FF5555>?{{ .Working.Untracked }}</>{{ end }}{{ if .Staging.Changed }}<#50FA7B>+{{ .Staging.Changed }}</>{{ end }}{{ if gt .StashCount 0 }}<#BD93F9>*{{ .StashCount }}</>{{ end }}'
    [blocks.segments.properties]
      fetch_status = true
      branch_icon = ''

[[blocks]]
  type = 'prompt'
  alignment = 'right'

  [[blocks.segments]]
    type = 'executiontime'
    style = 'plain'
    foreground = '#6272A4'
    template = ' {{ .FormattedMs }}'
    [blocks.segments.properties]
      threshold = 500
      style = 'roundrock'

  [[blocks.segments]]
    type = 'time'
    style = 'plain'
    foreground = '#FF79C6'
    template = ' {{ .CurrentDate | date "15:04:05" }}'

# Second line - prompt character
[[blocks]]
  type = 'prompt'
  alignment = 'left'
  newline = true

  [[blocks.segments]]
    type = 'text'
    style = 'plain'
    foreground = '#6272A4'
    template = '╰─'

  [[blocks.segments]]
    type = 'status'
    style = 'plain'
    foreground = '#FF79C6'
    foreground_templates = ['{{ if gt .Code 0 }}#FF5555{{ end }}']
    template = '❯ '

# Transient prompt for cleaner history
[transient_prompt]
  foreground = '#FF79C6'
  foreground_templates = ['{{ if gt .Code 0 }}#FF5555{{ end }}']
  template = '❯ '
