version = 4
final_space = true
console_title_template = '{{ .Folder }}'

[palette]
  fg      = '#E0DEF4'
  muted   = '#6E6A86'
  primary = '#C4A7E7'
  accent  = '#EA9A97'
  green   = '#9CCFD8'
  red     = '#EB6F92'
  yellow  = '#F6C177'
  orange  = '#EA9A97'
  purple  = '#C4A7E7'
  teal    = '#3E8FB0'

# First line - path, git, fill, hostname, time
[[blocks]]
  type = 'prompt'
  alignment = 'left'

  [[blocks.segments]]
    type = 'os'
    style = 'plain'
    foreground = 'p:fg'
    template = '{{ .Icon }}'

  [[blocks.segments]]
    type = 'text'
    style = 'plain'
    foreground = 'p:muted'
    template = '─'

  [[blocks.segments]]
    type = 'path'
    style = 'plain'
    foreground = 'p:primary'
    template = ' {{ .Path }}'
    [blocks.segments.properties]
      style = 'full'

  [[blocks.segments]]
    type = 'git'
    style = 'plain'
    foreground = 'p:orange'
    template = ' {{ .HEAD }}{{ if or .Working.Changed .Staging.Changed .Working.Untracked }} {{ end }}{{ if .Working.Changed }}<p:red>!{{ .Working.Changed }}</>{{ end }}{{ if .Working.Untracked }}<p:red>?{{ .Working.Untracked }}</>{{ end }}{{ if .Staging.Changed }}<p:green>+{{ .Staging.Changed }}</>{{ end }}{{ if gt .StashCount 0 }}<p:purple>*{{ .StashCount }}</>{{ end }}'
    [blocks.segments.properties]
      fetch_status = true
      branch_icon = ''

[[blocks]]
  type = 'prompt'
  alignment = 'right'

  [[blocks.segments]]
    type = 'executiontime'
    style = 'plain'
    foreground = 'p:muted'
    template = ' {{ .FormattedMs }}'
    [blocks.segments.properties]
      threshold = 500
      style = 'roundrock'

  [[blocks.segments]]
    type = 'time'
    style = 'plain'
    foreground = 'p:accent'
    template = ' {{ .CurrentDate | date "15:04:05" }}'

# Second line - prompt character
[[blocks]]
  type = 'prompt'
  alignment = 'left'
  newline = true

  [[blocks.segments]]
    type = 'text'
    style = 'plain'
    foreground = 'p:muted'
    template = '╰─'

  [[blocks.segments]]
    type = 'status'
    style = 'plain'
    foreground = 'p:green'
    foreground_templates = ['{{ if gt .Code 0 }}p:red{{ end }}']
    template = '❯ '

# Transient prompt for cleaner history
[transient_prompt]
  foreground = 'p:green'
  foreground_templates = ['{{ if gt .Code 0 }}p:red{{ end }}']
  template = '❯ '
