<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tmux Window Styles - Rose Pine Moon</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #191724;
    color: #e0def4;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    padding: 32px;
    min-height: 100vh;
  }

  h1 {
    font-size: 14px;
    font-weight: 500;
    color: #908caa;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .subtitle {
    font-size: 13px;
    color: #6e6a86;
    margin-bottom: 32px;
  }

  .concepts {
    display: flex;
    flex-direction: column;
    gap: 20px;
    max-width: 960px;
  }

  .concept {
    border: 1px solid #2a273f;
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .concept:hover { border-color: #393552; }

  .concept.selected {
    border-color: #c4a7e7;
    box-shadow: 0 0 0 1px #c4a7e7;
  }

  .concept-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 16px;
    background: #1f1d2e;
  }

  .concept-name {
    font-size: 14px;
    font-weight: 600;
    color: #e0def4;
  }

  .concept-desc {
    font-size: 12px;
    color: #908caa;
    margin-top: 2px;
  }

  .concept-badge {
    font-size: 11px;
    color: #232136;
    background: #c4a7e7;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 600;
    display: none;
  }

  .concept.selected .concept-badge { display: inline-block; }

  /* Tmux bar mockup */
  .tmux-bar {
    display: flex;
    align-items: center;
    height: 30px;
    padding: 0 6px;
    font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace;
    font-size: 13.5px;
    position: relative;
  }

  .bar-left {
    display: flex;
    align-items: center;
    flex-shrink: 0;
  }

  .bar-center {
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 1;
  }

  .bar-right {
    display: flex;
    align-items: center;
    flex-shrink: 0;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    white-space: nowrap;
  }

  .pill-open, .pill-close {
    font-size: 17px;
    line-height: 30px;
  }

  .pill-content {
    padding: 0 7px;
    line-height: 30px;
  }

  .window-inactive {
    padding: 0 12px;
    line-height: 30px;
    white-space: nowrap;
  }

  /* Legend */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    padding: 8px 16px;
    background: #1f1d2e;
    border-top: 1px solid #2a273f;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: #6e6a86;
  }

  .legend-swatch {
    width: 10px;
    height: 10px;
    border-radius: 2px;
  }

  .legend-label { color: #908caa; }

  /* Output */
  .output-section {
    margin-top: 32px;
    max-width: 960px;
  }

  .output-label {
    font-size: 12px;
    color: #6e6a86;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .output-box {
    background: #1f1d2e;
    border: 1px solid #2a273f;
    border-radius: 8px;
    padding: 16px;
    font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', monospace;
    font-size: 12px;
    line-height: 1.6;
    color: #e0def4;
    position: relative;
    white-space: pre-wrap;
    word-break: break-all;
  }

  .copy-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    background: #393552;
    color: #e0def4;
    border: none;
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 11px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }

  .copy-btn:hover { background: #44415a; }
  .copy-btn.copied { background: #3e8fb0; color: #232136; }
</style>
</head>
<body>

<h1>Tmux Window Styles</h1>
<p class="subtitle">Rose Pine Moon -- focused on inactive window visibility. Click to select, copy config below.</p>

<div class="concepts" id="concepts"></div>

<div class="output-section">
  <div class="output-label">Tmux config output</div>
  <div class="output-box" id="output">
    <button class="copy-btn" id="copyBtn" onclick="copyPrompt()">Copy</button>
    <span id="outputText"></span>
  </div>
</div>

<script>
const P = {
  base:    '#232136',
  surface: '#2a273f',
  overlay: '#393552',
  muted:   '#6e6a86',
  subtle:  '#908caa',
  text:    '#e0def4',
  love:    '#eb6f92',
  gold:    '#f6c177',
  rose:    '#ea9a97',
  pine:    '#3e8fb0',
  foam:    '#9ccfd8',
  iris:    '#c4a7e7',
  hl_med:  '#44415a',
};

// All concepts keep session=iris, hostname=foam, active=gold+iris colon (Warm Flow base)
// They vary ONLY in inactive window treatment
const CONCEPTS = [
  {
    name: 'Bright Match',
    desc: 'Inactive windows use text (#e0def4) — same brightness as the reference screenshot. Active stands out by pill + gold only.',
    active: { index: 'gold', colon: 'iris', name: 'gold' },
    inactive: { index: 'text', colon: 'subtle', name: 'text' },
  },
  {
    name: 'Soft Rose',
    desc: 'Inactive windows in rose (#ea9a97) — warm and readable, clearly different from gold active.',
    active: { index: 'gold', colon: 'iris', name: 'gold' },
    inactive: { index: 'rose', colon: 'muted', name: 'rose' },
  },
  {
    name: 'Cool Foam',
    desc: 'Inactive windows in foam (#9ccfd8) — cool contrast to warm active. Mirrors the hostname color.',
    active: { index: 'gold', colon: 'iris', name: 'gold' },
    inactive: { index: 'foam', colon: 'pine', name: 'foam' },
  },
  {
    name: 'Iris Echo',
    desc: 'Inactive windows in iris (#c4a7e7) — purple ties back to session pill. Active gold pops against it.',
    active: { index: 'gold', colon: 'iris', name: 'gold' },
    inactive: { index: 'iris', colon: 'subtle', name: 'iris' },
  },
  {
    name: 'Subtle Boost',
    desc: 'Inactive in subtle (#908caa) — what you have now, but with rose colon for a touch of warmth.',
    active: { index: 'gold', colon: 'iris', name: 'gold' },
    inactive: { index: 'subtle', colon: 'rose', name: 'subtle' },
  },
  {
    name: 'Warm Duo',
    desc: 'Inactive index in subtle, name in rose — a two-tone approach. Number recedes, name stays warm and readable.',
    active: { index: 'gold', colon: 'iris', name: 'gold' },
    inactive: { index: 'subtle', colon: 'muted', name: 'rose' },
  },
];

let selected = 0;

function renderBar(container, concept) {
  const ov = P.overlay;
  const a = concept.active;
  const n = concept.inactive;

  container.innerHTML = '';
  container.style.background = P.base;

  // Left pill: session (iris)
  const left = mk('div', 'bar-left');
  left.innerHTML =
    `<span class="pill">` +
      `<span class="pill-open" style="color:${ov}">&#xE0B6;</span>` +
      `<span class="pill-content" style="background:${ov};color:${P.iris}">&nbsp;chezmoi&nbsp;</span>` +
      `<span class="pill-close" style="color:${ov}">&#xE0B0;</span>` +
    `</span>`;

  const center = mk('div', 'bar-center');

  // Inactive 1
  center.innerHTML +=
    `<span class="window-inactive">` +
      `<span style="color:${P[n.index]}">1</span>` +
      `<span style="color:${P[n.colon]}">:</span>` +
      `<span style="color:${P[n.name]}">zsh</span>` +
    `</span>`;

  // Active 2 (pill)
  center.innerHTML +=
    `<span class="pill">` +
      `<span class="pill-open" style="color:${ov}">&#xE0B6;</span>` +
      `<span class="pill-content" style="background:${ov}">` +
        `<span style="color:${P[a.index]}">2</span>` +
        `<span style="color:${P[a.colon]}">:</span>` +
        `<span style="color:${P[a.name]}">nvim</span>` +
      `</span>` +
      `<span class="pill-close" style="color:${ov}">&#xE0B4;</span>` +
    `</span>`;

  // Inactive 3
  center.innerHTML +=
    `<span class="window-inactive">` +
      `<span style="color:${P[n.index]}">3</span>` +
      `<span style="color:${P[n.colon]}">:</span>` +
      `<span style="color:${P[n.name]}">htop</span>` +
    `</span>`;

  // Inactive 4
  center.innerHTML +=
    `<span class="window-inactive">` +
      `<span style="color:${P[n.index]}">4</span>` +
      `<span style="color:${P[n.colon]}">:</span>` +
      `<span style="color:${P[n.name]}">yazi</span>` +
    `</span>`;

  // Right pill: hostname (foam)
  const right = mk('div', 'bar-right');
  right.innerHTML =
    `<span class="pill">` +
      `<span class="pill-open" style="color:${ov}">&#xE0B2;</span>` +
      `<span class="pill-content" style="background:${ov};color:${P.foam}">&nbsp;macbook&nbsp;</span>` +
      `<span class="pill-close" style="color:${ov}">&#xE0B4;</span>` +
    `</span>`;

  container.appendChild(left);
  container.appendChild(center);
  container.appendChild(right);
}

function mk(tag, cls) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  return e;
}

function render() {
  const container = document.getElementById('concepts');
  container.innerHTML = '';

  CONCEPTS.forEach((concept, i) => {
    const card = mk('div', 'concept' + (i === selected ? ' selected' : ''));
    card.onclick = () => { selected = i; render(); updateOutput(); };

    const header = mk('div', 'concept-header');
    const info = mk('div');
    const name = mk('div', 'concept-name');
    name.textContent = concept.name;
    const desc = mk('div', 'concept-desc');
    desc.textContent = concept.desc;
    info.appendChild(name);
    info.appendChild(desc);
    const badge = mk('span', 'concept-badge');
    badge.textContent = 'Selected';
    header.appendChild(info);
    header.appendChild(badge);

    const bar = mk('div', 'tmux-bar');
    renderBar(bar, concept);

    const legend = mk('div', 'legend');
    const items = [
      ['Active', concept.active.index],
      ['Active :', concept.active.colon],
      ['Inactive', concept.inactive.index],
      ['Inactive :', concept.inactive.colon],
    ];
    // Add inactive name if different from index
    if (concept.inactive.name !== concept.inactive.index) {
      items.push(['Inactive name', concept.inactive.name]);
    }
    items.forEach(([label, colorName]) => {
      const item = mk('div', 'legend-item');
      const swatch = mk('div', 'legend-swatch');
      swatch.style.background = P[colorName];
      const lbl = mk('span', 'legend-label');
      lbl.textContent = `${label}: ${colorName}`;
      item.appendChild(swatch);
      item.appendChild(lbl);
      legend.appendChild(item);
    });

    card.appendChild(header);
    card.appendChild(bar);
    card.appendChild(legend);
    container.appendChild(card);
  });
}

function updateOutput() {
  const c = CONCEPTS[selected];
  const ov = P.overlay;

  const lines = [
    `# Rose Pine Moon status bar (Warm Flow + ${c.name})`,
    `set -g status-style "bg=${P.base},fg=${P.text}"`,
    `set -g status-justify centre`,
    `set -g status-left-length 100`,
    `set -g status-right-length 100`,
    ``,
    `# Left: session name in pill (love on prefix, iris otherwise)`,
    `set -g status-left "#[fg=${ov},bg=default]#(printf '\\uE0B6')#[bg=${ov},fg=#{?client_prefix,${P.love},${P.iris}}] #S #[fg=${ov},bg=default]#(printf '\\uE0B0')"`,
    ``,
    `# Right: hostname in pill (foam)`,
    `set -g status-right "#[fg=${ov},bg=default]#(printf '\\uE0B2')#[bg=${ov},fg=${P.foam}] #h #[fg=${ov},bg=default]#(printf '\\uE0B4')"`,
    ``,
    `# Window list`,
    `set -g window-status-separator ""`,
    `set -g window-status-format "  #[fg=${P[c.inactive.index]}]#I#[fg=${P[c.inactive.colon]}]:#[fg=${P[c.inactive.name]}]#W  "`,
    `set -g window-status-current-format "#[fg=${ov},bg=default]#(printf '\\uE0B6')#[bg=${ov},fg=${P[c.active.index]}]#I#[fg=${P[c.active.colon]}]:#[fg=${P[c.active.name]}]#W#[fg=${ov},bg=default]#(printf '\\uE0B4')"`,
  ];

  document.getElementById('outputText').textContent = lines.join('\n');
}

function copyPrompt() {
  const text = document.getElementById('outputText').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
  });
}

render();
updateOutput();
</script>
</body>
</html>
