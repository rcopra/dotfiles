# Set colors
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"

set -g history-limit 100000

# Start windows and panes at 1
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# override title
set -g set-titles on
set -g set-titles-string "#{pane_title}"

set -g window-style 'bg=default'
set -g window-active-style 'bg=default'

set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

unbind %
bind | split-window -h

unbind '"'
bind - split-window -v

unbind r
bind r source-file ~/.tmux.conf

bind -r Down resize-pane -D 5
bind -r Up resize-pane -U 5
bind -r Right resize-pane -R 5
bind -r Left resize-pane -L 5

bind -r m resize-pane -Z

bind M-c attach-session -c "#{pane_current_path}"

# Tmux sessionizer - ThePrimeagen style
bind-key -r f run-shell "tmux neww ~/bin/tmux-sessionizer"

# Quick directory shortcuts
bind-key -r C-d run-shell "~/bin/tmux-sessionizer ~/.local/share/chezmoi/home"
bind-key -r C-n run-shell "~/bin/tmux-sessionizer ~/.config/nvim"
bind-key -r C-w run-shell "~/bin/tmux-sessionizer ~/work"
bind-key -r C-p run-shell "~/bin/tmux-sessionizer ~/personal"
bind-key -r C-s run-shell "~/bin/tmux-sessionizer ~/personal/ssh"

set -g mouse on

set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi S-Up send -X scroll-up
bind-key -T copy-mode-vi S-Down send -X scroll-down

# ==============================================================================
# Clipboard Integration (OSC 52 - works over SSH)
# ==============================================================================
# Use tmux's built-in OSC 52 support (set-clipboard on below handles this)
# This works on macOS, Linux, and over SSH with modern terminals
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel
bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-and-cancel
bind-key -T copy-mode-vi Enter send -X copy-selection-and-cancel
set -g allow-passthrough on
set -g set-clipboard on


# remove delay for exiting insert mode with ESC in Neovim
set -sg escape-time 0

# tpm plugin
set -g @plugin 'tmux-plugins/tpm'

# list of tmux plugins
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-sensible' # optional recommended

# vim-tmux-navigator: use Ctrl+Arrow for pane navigation
set -g @vim_navigator_mapping_left "C-Left"
set -g @vim_navigator_mapping_right "C-Right"
set -g @vim_navigator_mapping_up "C-Up"
set -g @vim_navigator_mapping_down "C-Down"

##
# Styling
##

# Bamboo Multiplex
RED="#dc4f62"
GREEN="#81af58"
YELLOW="#ceba49"
BLUE="#409cdc"
MAGENTA="#a09af8"
CYAN="#68baae"
BLACK="#171f17"
WHITE="#ece1c0"
DARK_GRAY="#5a5e5a"
LIGHT_GRAY="#818781"
BG="#232923"
FG="#ece1c0"

# Powerline glyphs
HALF_ROUND_OPEN="#(printf '\uE0B6')"
HALF_ROUND_CLOSE="#(printf '\uE0B4')"
TRIANGLE_OPEN="#(printf '\uE0B2')"
TRIANGLE_CLOSE="#(printf '\uE0B0')"
HEXAGON_FILL="#(printf '\uE0CC')"
HEXAGON_EMPTY="#(printf '\uE0CD')"

set -g status-style bg=${BG},fg=${FG}
set -g status-justify centre

set -g status-left "\
#[fg=${default},bg=GREEN]${HALF_ROUND_OPEN}\
#[bg=${GREEN},fg=${BLACK}]#S\
#[fg=${GREEN},bg=default]${TRIANGLE_CLOSE}\
"

set -g status-right "\
#[fg=${GREEN},bg=default]${TRIANGLE_OPEN}\
#[bg=${GREEN},fg=${BLACK}]#S\
#[fg=${GREEN},bg=default]${HALF_ROUND_CLOSE}\
"

set -g status-left-length 100
set -g status-right-length 100

set -g window-status-format "\
 \
#I\
#[fg=${MAGENTA}]:\
#[fg=${default}]#W\
 \
"

set -g window-status-current-format "\
#[fg=${LIGHT_GRAY},bg=default]${HALF_ROUND_OPEN}\
#[bg=${LIGHT_GRAY}, fg=default]#I\
#[fg=${RED}]:\
#[fg=${default}]#W\
#[fg=${LIGHT_GRAY},bg=default]${HALF_ROUND_CLOSE}\
"

set-option -g window-status-separator ""

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# Fix mouse click behavior
bind-key -T root MouseDown1Pane select-pane -t = \; send-keys -M

# Enable focus events so applications can detect when you switch panes
set -g focus-events on

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
